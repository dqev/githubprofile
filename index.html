<body>

  <!-- Floating Mobile Menu Trigger -->
  <button class="mobile-sidebar-toggle" id="sidebarToggle" aria-label="Toggle Sidebar Form">

        <!-- STEP 1: Profile Essentials -->

          <summary>
            <div class="summary-left">
              <span class="summary-step">1</span>
              <span>Profile</span>
            </div>
            <svg class="chevron-icon" viewBox="0 0 20 20" fill="currentColor">

          <div class="details-content">
            <div class="form-group">
              <label for="essentials-align">Alignment</label>
              <div class="input-wrapper">
                <i class="fas fa-align-left" aria-hidden="true"></i>
                <select id="essentials-align">
                  <option value="left" selected>Left</option>
                  <option value="center">Center</option>
                  <option value="right">Right</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="name">Name</label>
                <div class="input-wrapper">
                  <input type="text" id="name" placeholder="John Doe">
                </div>
              </div>
              <div class="form-group">
                <label for="github-username">GitHub Username</label>
                <div class="input-wrapper">
                  <i class="fab fa-github" aria-hidden="true"></i>
                  <input type="text" id="github-username" placeholder="username" oninput="updateProfileImage(); syncGithubUsername(this.value)">
                </div>
              </div>
            </div>

            <!-- GitHub Profile Avatar Auto Preview -->
            <div class="avatar-preview-box">
              <img id="preview-avatar" src="https://via.placeholder.com/200x200" alt="Avatar">
              <p>Type your GitHub username.</p>
            </div>

            <!-- Toggle to include avatar in Markdown output -->
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="show-avatar" checked>
                <span class="checkbox-custom">
                  <i class="fas fa-check" aria-hidden="true"></i>
                </span>
                <span>Show Profile Avatar in README</span>
              </label>
            </div>

            <div class="form-group">
              <label for="subtitle">Role / Subtitle</label>
              <div class="input-wrapper">
                <input type="text" id="subtitle" placeholder="Full Stack Developer">
              </div>
            </div>

            <div class="form-group">
              <label for="banner-url">Banner Image URL</label>
              <div class="input-wrapper">
                <i class="fas fa-image" aria-hidden="true"></i>
                <input type="text" id="banner-url" placeholder="https://imgur.com/...">
              </div>
            </div>

            <div class="form-group">
              <label for="about">About Me (Bio)</label>
              <div class="input-wrapper" style="height: auto; padding: 6px 12px;">
                <textarea id="about" placeholder="I'm a passionate developer currently working on..." rows="3" style="width: 100%; border: 0; outline: none; background: transparent; font-size: 13px; resize: vertical;"></textarea>
              </div>
            </div>

            <!-- Details inputs mapping -->
            <div class="form-group">
              <label>Work & Learning Details</label>
              <div style="display: flex; flex-direction: column; gap: 8px;">
                <div class="input-wrapper">
                  <span style="font-size: 14px; margin-right: 8px;">🔭</span>
                  <input type="text" id="working" placeholder="Currently working on...">
                </div>
                <div class="input-wrapper">
                  <span style="font-size: 14px; margin-right: 8px;">🌱</span>
                  <input type="text" id="learning" placeholder="Currently learning...">
                </div>
                <div class="input-wrapper">
                  <span style="font-size: 14px; margin-right: 8px;">👯</span>

                <div class="input-wrapper">
                  <span style="font-size: 14px; margin-right: 8px;">🤝</span>

                <div class="input-wrapper">
                  <span style="font-size: 14px; margin-right: 8px;">💬</span>

                <div class="input-wrapper">
                  <span style="font-size: 14px; margin-right: 8px;">📫</span>

                <div class="input-wrapper">
                  <span style="font-size: 14px; margin-right: 8px;">⚡</span>

                <input type="text" id="social-dribbble" placeholder="Dribbble username">
              </div>
              <div class="input-wrapper">
                <i class="fab fa-behance" aria-hidden="true" style="width: 16px; color: #1769ff;"></i>
                <input type="text" id="social-behance" placeholder="Behance username">
              </div>
              <!-- Coding Platforms -->
              <div class="input-wrapper">
                <i class="fas fa-code" aria-hidden="true" style="width: 16px; color: #ffa116;"></i>
                <input type="text" id="social-leetcode" placeholder="LeetCode username">
              </div>
              <div class="input-wrapper">
                <i class="fas fa-terminal" aria-hidden="true" style="width: 16px; color: #2ec866;"></i>

              </div>
            </div>
          </div>
        </details>

        <!-- STEP 4: Projects -->
        <details>
          <summary>
            <div class="summary-left">
              <span class="summary-step">4</span>
              <span>Projects</span>

            <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
              <div class="input-wrapper">
                <i class="fas fa-mug-hot" aria-hidden="true" style="color: #ffdd00;"></i>
                <input type="text" id="donate-buymeacoffee" placeholder="Buy Me a Coffee username">
              </div>
              <div class="input-wrapper">
                <i class="fas fa-coffee" aria-hidden="true" style="color: #00aff0;"></i>
                <input type="text" id="donate-kofi" placeholder="Ko-fi username">
              </div>
              <div class="input-wrapper">
                <i class="fab fa-patreon" aria-hidden="true" style="color: #f96854;"></i>
                <input type="text" id="donate-patreon" placeholder="Patreon username">
              </div>
              <div class="input-wrapper">
                <i class="fab fa-paypal" aria-hidden="true" style="color: #003087;"></i>
                <input type="text" id="donate-paypal" placeholder="PayPal email / link">
              </div>
            </div>
          </div>
        </details>

        <!-- STEP 6: Widgets & Stats -->
        <details>
          <summary>
            <div class="summary-left">
              <span class="summary-step">6</span>
              <span>Widgets & Stats</span>
            </div>
            <svg class="chevron-icon" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
            </svg>
          </summary>
          <div class="details-content">
            <div class="form-row" style="padding-bottom: 8px; border-bottom: 1px solid var(--border);">
              <div class="form-group">
                <label for="stats-theme">Stats Theme</label>
                <div class="input-wrapper">
                  <select id="stats-theme">
                    <option value="tokyonight">Tokyo Night</option>
                    <option value="radical">Radical</option>
                    <option value="dracula">Dracula</option>
                    <option value="gruvbox">Gruvbox</option>
                    <option value="onedark">One Dark</option>
                    <option value="cobalt">Cobalt</option>
                    <option value="synthwave">Synthwave</option>
                    <option value="highcontrast">High Contrast</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label for="widgets-align">Alignment</label>
                <div class="input-wrapper">
                  <i class="fas fa-align-left" aria-hidden="true"></i>
                  <select id="widgets-align">
                    <option value="left" selected>Left</option>
                    <option value="center">Center</option>
                    <option value="right">Right</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Checklist Widgets using solid custom layout checkboxes -->
            <div style="display: flex; flex-direction: column; gap: 8px;">
              <label class="checkbox-label">
                <input type="checkbox" id="addon-stats">
                <span class="checkbox-custom">
                  <i class="fas fa-check" aria-hidden="true"></i>
                </span>
                <span>GitHub Stats Graph</span>
              </label>

              <label class="checkbox-label">
                <input type="checkbox" id="addon-streak">
                <span class="checkbox-custom">
                  <i class="fas fa-check" aria-hidden="true"></i>
                </span>
                <span>Commit Streak Graph</span>
              </label>

              <label class="checkbox-label">
                <input type="checkbox" id="addon-trophy">
                <span class="checkbox-custom">
                  <i class="fas fa-check" aria-hidden="true"></i>
                </span>
                <span>GitHub Trophies</span>
              </label>

              <label class="checkbox-label">
                <input type="checkbox" id="addon-visitors">
                <span class="checkbox-custom">
                  <i class="fas fa-check" aria-hidden="true"></i>
                </span>
                <span>Visitor Counter Badge</span>
              </label>

              <label class="checkbox-label">
                <input type="checkbox" id="addon-twitter-badge">
                <span class="checkbox-custom">
                  <i class="fas fa-check" aria-hidden="true"></i>
                </span>
                <span>Twitter Follow Badge</span>
              </label>
            </div>
          </div>
        </details>

      </form>

      <!-- Sidebar Footer -->
      <footer class="sidebar-footer" itemscope itemtype="https://schema.org/WPFooter">
        <div style="display: flex; flex-direction: column;">
          <span>© 2026 Github Readme</span>
        </div>
        <div class="footer-links">
          <a href="https://github.com/dqev" target="_blank" rel="noopener noreferrer" title="GitHub Profile" aria-label="Visit devchauhann on GitHub">
            <i class="fab fa-github" aria-hidden="true"></i>
          </a>
          <a href="https://twitter.com/devchauhann3" target="_blank" rel="noopener noreferrer" title="Twitter Profile" aria-label="Follow devchauhann on Twitter">
            <i class="fab fa-twitter" aria-hidden="true"></i>
          </a>
          <a href="mailto:dev@devchauhhan.in" title="Email Contact" aria-label="Send email to Developer">
            <i class="fas fa-envelope" aria-hidden="true"></i>
          </a>
        </div>
      </footer>
    </aside>

    <!-- RIGHT MAIN WORKSPACE: Output Preview & Actions -->
    <main class="main-workspace">
      
      <!-- Upper Toolbar -->
      <section class="toolbar" aria-label="Toolbar Action Controls">
        <!-- Row 1: Tabs & Theme Toggle -->
        <div class="toolbar-header-row">
          <div class="toolbar-tabs" role="tablist" aria-label="Toggle Output View">
            <button class="tab-btn active" id="tab-preview" onclick="switchTab('preview')" role="tab" aria-selected="true">
              Preview
            </button>
            <button class="tab-btn" id="tab-code" onclick="switchTab('code')" role="tab" aria-selected="false">
              Markdown
            </button>
          </div>

          <!-- Theme Toggler (morph animation style) -->
          <button class="theme-toggle" id="themeToggler" onclick="toggleTheme()" aria-label="Toggle Light/Dark Theme">
            <span class="theme-icon-stack">
              <span class="theme-icon theme-icon-sun">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="4"></circle>
                  <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                </svg>
              </span>
              <span class="theme-icon theme-icon-moon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
                </svg>
              </span>
            </span>
          </button>
        </div>

        <!-- Row 2: Action Buttons -->
        <div class="toolbar-actions-row">
          <button onclick="copyToClipboard()" class="btn-secondary-solid" id="btn-copy">
            <i class="far fa-copy" aria-hidden="true"></i> Copy Code
          </button>
          <button onclick="downloadMarkdown()" class="btn-primary-solid">
            <i class="fas fa-download" aria-hidden="true"></i> Download
          </button>
        </div>
      </section>

      <!-- Center Document Container -->
      <section class="document-container" id="preview-container">
        <!-- Rendered HTML Markdown output - NO CARDS LOOKS - borderless sheet flowing on bg -->
        <article class="document-readme markdown-body" id="preview-content">
          <!-- Injected via app.js -->
        </article>
      </section>

      <!-- Center Code Container -->
      <section class="document-container hidden" id="code-container" style="padding: 0;">
        <div class="document-source">
          <textarea id="code-output" readonly aria-label="Generated Markdown Output Code"></textarea>
        </div>
      </section>

    </main>

  </div>

  <!-- Redesign App Logic -->
  <script src="app.js"></script>
</body>

</html>
